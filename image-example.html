<html>
    <head>
        <style>
            @font-face {
                font-family: 'nintendo_NTLGDB_001';
                src: url(nintendo_NTLGDB_001.woff);
            }

            img {
                font-family: 'nintendo_NTLGDB_001';
                background: #fff;
                border: 1px solid rgba(0, 0, 0, 0.1);
                overflow: scroll;
                box-shadow: 0 1px 0px rgba(0, 0, 0, 0.2);
                border-radius: 5px;
                text-align: left;
                color: #323232;
                max-width: 192px;
                max-height: 192px;
            }

            p {
                font-family: 'nintendo_NTLGDB_001';
                color: #969696;
                display: block;
                overflow: hidden;
                white-space: nowrap;
                text-overflow: ellipsis;
                word-wrap: normal;
                margin: 4px;
            }

            div {
                background: #f9f9f9;
                border: 1px solid rgba(0, 0, 0, 0.1);
                overflow: hidden;
                box-shadow: 0 1px 0px rgba(0, 0, 0, 0.2);
                border-radius: 5px;
                width: fit-content;
            }
        </style>
    </head>
    <body>
        <div>
            <img src="minecraft.png"></img>
            <p>Minecraft. Wow!</p>
        </div>
    </body>
</html>

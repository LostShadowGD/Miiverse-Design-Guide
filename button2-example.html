<html>
    <head>
        <style>
            @font-face {
                font-family: 'nintendo_NTLGDB_001';
                src: url(nintendo_NTLGDB_001.woff);
            }

            button {
                font-family: 'nintendo_NTLGDB_001';
                background: #fff;
                border: 1px solid rgba(0, 0, 0, 0.1);
                overflow: hidden;
                box-shadow: 0 1px 0px rgba(0, 0, 0, 0.2);
                border-radius: 5px;
                text-align: left;
                color: #323232;
            }

            .flex {
                display: flex;
                flex-direction: row;
            }

            h2 {
                margin: 0px;
                margin-bottom: 4px;
                color: #5ac800;
            }
        </style>
    </head>
    <body>
        <button class="flex"><img src="/pfp.png"><span><h2>This button looks better</h2>when there's two lines of text and an image!</span></button>
    </body>
</html>
